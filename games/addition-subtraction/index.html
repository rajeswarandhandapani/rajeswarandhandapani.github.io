<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Addition &amp; Subtraction Quiz | Kid Learning Games</title>
  <meta name="description" content="Timed addition and subtraction facts quiz for kids — within 10, within 20 or two-digit. Beat your best time!" />
  <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>➕</text></svg>" />
  <link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin />
  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    rel="stylesheet"
  />
  <link href="../../assets/css/common.css" rel="stylesheet" />
</head>
<body>
  <nav class="navbar navbar-dark klg-navbar mb-4">
    <div class="container">
      <a class="navbar-brand" href="../../index.html">&larr; Kid Learning Games</a>
      <span class="navbar-text text-white">➕ Addition &amp; Subtraction</span>
    </div>
  </nav>

  <div class="container quiz-shell pb-5">
    <!-- Start screen -->
    <div id="start-screen" class="card quiz-card p-4 text-center">
      <div class="card-body">
        <div class="game-card-icon mb-2">➕</div>
        <h1 class="h3 fw-bold">Addition &amp; Subtraction Facts</h1>
        <p class="text-muted" id="mode-label"></p>
        <div id="op-links" class="d-flex flex-wrap justify-content-center gap-2 mb-2">
          <a class="btn btn-sm btn-outline-secondary" data-op="mix" href="index.html">➕➖ Mix</a>
          <a class="btn btn-sm btn-outline-secondary" data-op="add" href="?op=add">➕ Addition</a>
          <a class="btn btn-sm btn-outline-secondary" data-op="sub" href="?op=sub">➖ Subtraction</a>
        </div>
        <div id="range-links" class="d-flex flex-wrap justify-content-center gap-2 mb-3">
          <a class="btn btn-sm btn-outline-secondary" data-max="10" href="?max=10">Within 10</a>
          <a class="btn btn-sm btn-outline-secondary" data-max="20" href="index.html">Within 20</a>
          <a class="btn btn-sm btn-outline-secondary" data-max="100" href="?max=100">Two-digit</a>
        </div>
        <p id="quiz-info">20 questions &bull; 10 seconds each &bull; multiple choice</p>
        <p id="best-time-note" class="fw-bold" style="color: var(--klg-purple);"></p>
        <button id="start-btn" class="btn btn-lg text-white fw-bold px-5 mt-2" style="background: var(--klg-purple);">
          Start Quiz
        </button>
      </div>
    </div>

    <!-- Quiz screen -->
    <div id="quiz-screen" class="card quiz-card p-4 d-none">
      <div class="card-body">
        <div class="d-flex justify-content-between align-items-center mb-2">
          <span class="quiz-progress-text">Question <span id="question-number">1</span> / <span id="total-questions">20</span></span>
          <div class="d-flex align-items-center gap-2">
            <span id="quiz-mascot" class="klg-mascot" aria-hidden="true">🐵</span>
            <span id="score-pill" class="quiz-score-pill">Score: 0</span>
          </div>
        </div>

        <div class="klg-progress-track mb-2">
          <div id="progress-fill" class="klg-progress-fill"></div>
        </div>

        <div class="quiz-timer-bar mb-1">
          <div id="timer-fill" class="quiz-timer-bar-fill"></div>
        </div>
        <div class="text-end mb-4"><small id="timer-text" class="text-muted">10s</small></div>

        <div id="streak-badge" class="klg-streak-badge"></div>

        <p id="question-text" class="quiz-question mb-4">7 + 8</p>

        <div id="choices-container" class="row justify-content-center g-2"></div>
      </div>
    </div>

    <!-- Results screen -->
    <div id="results-screen" class="card results-card p-4 d-none">
      <div class="card-body">
        <div id="results-emoji" class="results-emoji mb-2">🎉</div>
        <h2 class="fw-bold">Quiz Complete!</h2>
        <div id="results-score" class="results-score my-3">18 / 20</div>
        <div id="results-stars" class="results-stars mb-3"></div>
        <p id="results-time" class="fw-bold" style="color: var(--klg-purple);"></p>
        <p id="results-message" class="lead"></p>
        <div id="results-review" class="text-start mx-auto" style="max-width: 480px;"></div>
        <div class="d-flex justify-content-center gap-2 mt-4">
          <button id="play-again-btn" class="btn btn-lg text-white fw-bold px-4" style="background: var(--klg-purple);">
            Play Again
          </button>
          <a href="../../index.html" class="btn btn-lg btn-outline-secondary fw-bold px-4">
            More Games
          </a>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.3/dist/confetti.browser.min.js"></script>
  <script src="../../assets/js/sounds.js"></script>
  <script src="../../assets/js/quiz-engine.js"></script>
  <script src="game.js"></script>
</body>
</html>
