<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tamil Alphabets Quiz | Kid Learning Games</title>
  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    rel="stylesheet"
  />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Tamil:wght@700&display=swap" rel="stylesheet" />
  <link href="../../assets/css/common.css" rel="stylesheet" />
</head>
<body>
  <nav class="navbar navbar-dark klg-navbar mb-4">
    <div class="container">
      <a class="navbar-brand" href="../../index.html">&larr; Kid Learning Games</a>
      <span class="navbar-text text-white">அ Tamil Alphabets</span>
    </div>
  </nav>

  <div class="container quiz-shell pb-5">
    <!-- Start screen -->
    <div id="start-screen" class="card quiz-card p-4 text-center">
      <div class="card-body">
        <div class="game-card-icon mb-2">அ</div>
        <h1 class="h3 fw-bold">Tamil Alphabets Quiz</h1>
        <p class="text-muted" id="letters-label"></p>
        <p>One question per letter &bull; 10 seconds each &bull; multiple choice</p>
        <button id="start-btn" class="btn btn-lg text-white fw-bold px-5 mt-2" style="background: var(--klg-purple);">
          Start Quiz
        </button>
        <p class="mt-3 mb-0">
          <small class="text-muted">
            Tip: practice just the vowels or consonants with a link like
            <code>?type=vowels</code> or <code>?type=consonants</code>
          </small>
        </p>
      </div>
    </div>

    <!-- Quiz screen -->
    <div id="quiz-screen" class="card quiz-card p-4 d-none">
      <div class="card-body">
        <div class="d-flex justify-content-between align-items-center mb-2">
          <span class="quiz-progress-text">Question <span id="question-number">1</span> / <span id="total-questions">30</span></span>
          <span id="score-pill" class="quiz-score-pill">Score: 0</span>
        </div>

        <div class="quiz-timer-bar mb-1">
          <div id="timer-fill" class="quiz-timer-bar-fill"></div>
        </div>
        <div class="text-end mb-4"><small id="timer-text" class="text-muted">10s</small></div>

        <p id="question-text" class="quiz-question tamil-glyph mb-4">அ</p>

        <div id="choices-container" class="row justify-content-center g-2"></div>
      </div>
    </div>

    <!-- Results screen -->
    <div id="results-screen" class="card results-card p-4 d-none">
      <div class="card-body">
        <div id="results-emoji" class="results-emoji mb-2">🎉</div>
        <h2 class="fw-bold">Quiz Complete!</h2>
        <div id="results-score" class="results-score my-3">20 / 25</div>
        <div id="results-stars" class="results-stars mb-3"></div>
        <p id="results-message" class="lead"></p>
        <div id="results-review" class="text-start mx-auto tamil-glyph" style="max-width: 480px;"></div>
        <div class="d-flex justify-content-center gap-2 mt-4">
          <button id="play-again-btn" class="btn btn-lg text-white fw-bold px-4" style="background: var(--klg-purple);">
            Play Again
          </button>
          <a href="../../index.html" class="btn btn-lg btn-outline-secondary fw-bold px-4">
            More Games
          </a>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.3/dist/confetti.browser.min.js"></script>
  <script src="../../assets/js/quiz-engine.js"></script>
  <script src="game.js"></script>
</body>
</html>
