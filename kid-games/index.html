<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Kid Learning Games</title>
  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    rel="stylesheet"
  />
  <link href="assets/css/common.css" rel="stylesheet" />
</head>
<body>
  <nav class="navbar navbar-dark klg-navbar mb-4">
    <div class="container">
      <span class="navbar-brand mb-0">🎓 Kid Learning Games</span>
    </div>
  </nav>

  <div class="container pb-5">
    <div class="text-center mb-5">
      <h1 class="fw-bold">Pick a game to play!</h1>
      <p class="text-muted">Quick quizzes to help you learn and remember new things.</p>
    </div>

    <div class="row g-4 justify-content-center">
      <div class="col-12 col-sm-6 col-lg-4">
        <a href="games/multiplication/index.html" class="text-decoration-none">
          <div class="card game-card">
            <div class="card-body text-center p-4">
              <div class="game-card-icon mb-3">✖️</div>
              <h2 class="h4 fw-bold text-dark">Multiplication Tables</h2>
              <p class="text-muted mb-0">25 timed questions on tables 1-12</p>
            </div>
          </div>
        </a>
      </div>

      <div class="col-12 col-sm-6 col-lg-4">
        <div class="card game-card game-card-disabled">
          <div class="card-body text-center p-4">
            <div class="game-card-icon mb-3">🔤</div>
            <h2 class="h4 fw-bold text-dark">Spelling Bee</h2>
            <p class="text-muted mb-0">Coming soon</p>
          </div>
        </div>
      </div>

      <div class="col-12 col-sm-6 col-lg-4">
        <div class="card game-card game-card-disabled">
          <div class="card-body text-center p-4">
            <div class="game-card-icon mb-3">🌎</div>
            <h2 class="h4 fw-bold text-dark">World Capitals</h2>
            <p class="text-muted mb-0">Coming soon</p>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
